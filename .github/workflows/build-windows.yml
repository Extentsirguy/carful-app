name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python (for pip install)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Python Embeddable
        shell: pwsh
        run: |
          $pythonUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          $outDir = "resources\python-win"
          Invoke-WebRequest -Uri $pythonUrl -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath $outDir -Force
          Remove-Item python-embed.zip

          # Enable pip in embeddable Python by uncommenting import site
          $pthFile = Get-ChildItem "$outDir\python*._pth"
          (Get-Content $pthFile) -replace '#import site', 'import site' | Set-Content $pthFile

          # Install pip
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$outDir\get-pip.py"
          & "$outDir\python.exe" "$outDir\get-pip.py" --no-warn-script-location
          Remove-Item "$outDir\get-pip.py"

          # Install carful dependencies into the embeddable Python
          & "$outDir\python.exe" -m pip install -r carful\requirements.txt --no-warn-script-location --target "$outDir\Lib"

          # Add Lib to the path file so imports work
          Add-Content -Path $pthFile -Value "Lib"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows installer
        run: npx electron-forge make --platform win32 --arch x64

      - name: List build output
        shell: cmd
        run: dir out\make /s /b

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CARFul-Windows-Setup
          path: out/make/squirrel.windows/x64/*.exe
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/squirrel.windows/x64/*.exe
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
